<main class="landing" role="main">
  <header class="landing__hero">
    <p class="landing__tagline">
      Life is more fun when you take risks — embrace the truth, dare to dream, and let the game begin!
    </p>
  </header>

  <section *ngIf="show1st" class="landing__section" aria-labelledby="landing-categories-title">
    <p id="landing-categories-title" class="landing__kicker">Choose your game mode</p>
    <div class="mode-grid">
      <button type="button" class="mode-card mode-card--1" (click)="catgory(1)">
        <span class="mode-card__accent" aria-hidden="true"></span>
        <span class="mode-card__icon" aria-hidden="true"><i class="bi bi-balloon-heart-fill mode-card__glyph"></i></span>
        <span class="mode-card__body">
          <span class="mode-card__title">Friendly</span>
          <span class="mode-card__sub">Light &amp; fun for everyone</span>
        </span>
        <span class="mode-card__chevron" aria-hidden="true"></span>
      </button>

      <button type="button" class="mode-card mode-card--2" (click)="catgory(2)">
        <span class="mode-card__accent" aria-hidden="true"></span>
        <span class="mode-card__icon" aria-hidden="true"><i class="bi bi-people-fill mode-card__glyph"></i></span>
        <span class="mode-card__body">
          <span class="mode-card__title">Adult — single gender</span>
          <span class="mode-card__sub">Only boys or only girls</span>
        </span>
        <span class="mode-card__chevron" aria-hidden="true"></span>
      </button>

      <button type="button" class="mode-card mode-card--3" (click)="catgory(3)">
        <span class="mode-card__accent" aria-hidden="true"></span>
        <span class="mode-card__icon" aria-hidden="true"><i class="bi bi-fire mode-card__glyph"></i></span>
        <span class="mode-card__body">
          <span class="mode-card__title">Adult — mixed — normal</span>
          <span class="mode-card__sub">Boys &amp; girls, standard spice</span>
        </span>
        <span class="mode-card__chevron" aria-hidden="true"></span>
      </button>

      <button type="button" class="mode-card mode-card--4" (click)="catgory(4)">
        <span class="mode-card__accent" aria-hidden="true"></span>
        <span class="mode-card__icon" aria-hidden="true"><i class="bi bi-heart-pulse-fill mode-card__glyph"></i></span>
        <span class="mode-card__body">
          <span class="mode-card__title">Adult — mixed — 18+</span>
          <span class="mode-card__sub">Mature prompts</span>
        </span>
        <span class="mode-card__chevron" aria-hidden="true"></span>
      </button>

      <button type="button" class="mode-card mode-card--5" (click)="catgory(5)">
        <span class="mode-card__accent" aria-hidden="true"></span>
        <span class="mode-card__icon" aria-hidden="true"><i class="bi bi-arrow-through-heart mode-card__glyph"></i></span>
        <span class="mode-card__body">
          <span class="mode-card__title">Duo</span>
          <span class="mode-card__sub">One boy &amp; one girl</span>
        </span>
        <span class="mode-card__chevron" aria-hidden="true"></span>
      </button>

      <button type="button" class="mode-card mode-card--6" (click)="catgory(6)">
        <span class="mode-card__accent" aria-hidden="true"></span>
        <span class="mode-card__icon" aria-hidden="true"><i class="bi bi-moon-stars-fill mode-card__glyph"></i></span>
        <span class="mode-card__body">
          <span class="mode-card__title">Dirty couple</span>
          <span class="mode-card__sub">Honeymoon edition</span>
        </span>
        <span class="mode-card__chevron" aria-hidden="true"></span>
      </button>
    </div>
  </section>

  <section *ngIf="!show1st" class="landing__section landing__setup" aria-labelledby="landing-setup-title">
    <h2 id="landing-setup-title" class="landing__section-title">Set up players</h2>

    <div class="landing__gender" *ngIf="cat == 2" role="radiogroup" aria-label="Choose player group">
      <span class="landing__label"><i class="bi bi-people-fill landing__label-icon" aria-hidden="true"></i> Who is playing?</span>
      <div class="landing__radio-row">
        <label class="landing__radio">
          <input type="radio" name="gender" value="1" (change)="gend(1)">
          <i class="bi bi-gender-male landing__radio-icon" aria-hidden="true"></i>
          <span>Only boys</span>
        </label>
        <label class="landing__radio">
          <input type="radio" name="gender" value="2" (change)="gend(2)">
          <i class="bi bi-gender-female landing__radio-icon" aria-hidden="true"></i>
          <span>Only girls</span>
        </label>
      </div>
    </div>

    <div class="input-container" *ngIf="!showgender">
      <label class="landing__field-label" for="name"><i class="bi bi-person-plus-fill landing__label-icon" aria-hidden="true"></i> Player name</label>
      <div class="landing__input-row">
        <input type="text" class="name" id="name" name="name" placeholder="Enter name" autocomplete="off" maxlength="10" (keyup.enter)="addname()">
        <button type="button" class="add-button" (click)="addname()"><i class="bi bi-plus-lg" aria-hidden="true"></i> Add</button>
      </div>
    </div>

    <div class="name-list" *ngIf="!showgender" role="list" aria-label="Added players">
      <ng-container *ngFor="let item of nameList; let idx = index">
        <div class="chip" role="listitem">
          <i class="bi chip__icon" [ngClass]="nameChipIconAt(idx)" aria-hidden="true"></i>
          <span class="chip__text">{{ item }}</span>
          <button type="button" class="chip__remove" [attr.aria-label]="'Remove ' + item" (click)="removename(item)"></button>
        </div>
      </ng-container>
    </div>

    <div class="landing__duo" *ngIf="showgender">
      <div class="input-container input-container--duo">
        <span class="landing__role-badge landing__role-badge--he" aria-hidden="true"><i class="bi bi-gender-male"></i></span>
        <div class="landing__field">
          <label class="landing__field-label" for="malename"><i class="bi bi-person-heart landing__label-icon" aria-hidden="true"></i> His name</label>
          <input type="text" class="name name--full" id="malename" name="malename" placeholder="Enter name" autocomplete="off" maxlength="10">
        </div>
      </div>
      <div class="input-container input-container--duo">
        <span class="landing__role-badge landing__role-badge--she" aria-hidden="true"><i class="bi bi-gender-female"></i></span>
        <div class="landing__field">
          <label class="landing__field-label" for="femalename"><i class="bi bi-person-hearts landing__label-icon" aria-hidden="true"></i> Her name</label>
          <input type="text" class="name name--full" id="femalename" name="femalename" placeholder="Enter name" autocomplete="off" maxlength="10">
        </div>
      </div>
    </div>

    <p *ngIf="message != null" class="landing__message" role="alert">{{ message }}</p>

    <div class="landing__actions">
      <button type="button" class="btn-landing btn-landing--back" (click)="privious()"><i class="bi bi-arrow-left" aria-hidden="true"></i> Back</button>
      <button type="button" class="btn-landing btn-landing--start" *ngIf="nameList.length > 1 && !showgender" (click)="next()">Let's start <i class="bi bi-play-fill" aria-hidden="true"></i></button>
      <button type="button" class="btn-landing btn-landing--start" *ngIf="showgender" (click)="next1()">Let's start <i class="bi bi-play-fill" aria-hidden="true"></i></button>
    </div>
  </section>
</main>
