<main class="ludo-game" role="main" [class.ludo-game--portrait-lock]="portraitHint">
  <div class="ludo-game__page">
    <header class="ludo-game__top">
      <a routerLink="/landing" class="ludo-game__back">← All games</a>
      <span class="ludo-game__title">Couples board</span>
    </header>

    <div class="ludo-game__board">
      <!-- HER -->
      <aside class="ludo-game__side ludo-game__side--her" aria-label="Her side">
        <div class="ludo-game__side-inner">
          <div class="ludo-game__side-head">
            <div class="ludo-game__avatar" aria-hidden="true">♀</div>
            <div class="ludo-game__player-meta">
              <span class="ludo-game__player-name">{{ herName }}</span>
              <span class="ludo-game__player-role">HER</span>
            </div>
          </div>
          <div class="ludo-game__side-spacer">
            <div
              class="ludo-game__dice-readout"
              [class.ludo-game__dice-readout--rolling]="herRolling"
              aria-live="polite"
            >
              {{ herReadout }}
            </div>
          </div>
          <div class="ludo-game__side-actions">
            <button
              type="button"
              class="ludo-game__dice-wrap"
              (click)="rollHer()"
              [disabled]="herRolling"
              aria-label="Roll dice for her"
            >
              <svg
                class="ludo-game__dice-3d"
                [class.ludo-game__dice-3d--roll]="herRolling"
                [class.ludo-game__dice-3d--spin]="diceHerSpin && !herRolling"
                viewBox="0 0 64 64"
                xmlns="http://www.w3.org/2000/svg"
                aria-hidden="true"
              >
                <polygon points="32,4 58,18 32,32 6,18" [attr.fill]="herDiceColors.top" />
                <polygon points="58,18 58,46 32,60 32,32" [attr.fill]="herDiceColors.right" />
                <polygon points="6,18 32,32 32,60 6,46" [attr.fill]="herDiceColors.left" />
                <circle *ngFor="let d of herDots()" [attr.cx]="d[0]" [attr.cy]="d[1]" r="3" [attr.fill]="herDiceColors.dot" />
              </svg>
            </button>
            <span class="ludo-game__dice-lbl">ROLL</span>
            <button
              type="button"
              class="ludo-game__play-bar"
              (click)="playHer()"
              [disabled]="herRolling"
            >
              <i class="bi bi-play-fill ludo-game__play-bar-icon" aria-hidden="true"></i>
              Play
            </button>
          </div>
        </div>
      </aside>

      <!-- Scrollable grid -->
      <div class="ludo-game__inner">
        <div class="ludo-game__grid" *ngFor="let row of trackRows; trackBy: trackRowByIndex">
          <ng-container *ngFor="let slot of row; trackBy: trackSlotByKind">
            <!-- GO -->
            <div *ngIf="slot.kind === 'go'" class="ludo-game__go-card">
              <span class="ludo-game__go-label">GO</span>
              <span class="ludo-game__go-sub">START</span>
            </div>

            <!-- PLAYERS (first card): hidden until tap, same ? + Sl. No. as deck -->
            <ng-container *ngIf="slot.kind === 'players'">
              <button
                *ngIf="isDeckHidden(slot.card)"
                type="button"
                class="ludo-game__cell ludo-game__cell--mystery"
                (click)="revealDeckCell(slot.card)"
                [attr.aria-label]="'Hidden tile, Sl. No. ' + trackSerialNo(slot.card) + ', tap to reveal PLAYERS'"
              >
                <span class="ludo-game__mystery-q" aria-hidden="true">?</span>
                <span class="ludo-game__mystery-sl">
                  <span class="ludo-game__mystery-sl-label">Sl. No.</span>
                  <span class="ludo-game__mystery-sl-num">{{ trackSerialNo(slot.card) }}</span>
                </span>
              </button>
              <div *ngIf="!isDeckHidden(slot.card)" class="ludo-game__players-card">
                <img
                  *ngIf="slot.card.img"
                  [src]="slot.card.img"
                  alt=""
                  class="ludo-game__players-img"
                />
                <svg
                  *ngIf="!slot.card.img"
                  viewBox="0 0 44 32"
                  xmlns="http://www.w3.org/2000/svg"
                  aria-hidden="true"
                >
                  <circle cx="14" cy="9" r="6" fill="#c084fc" />
                  <path d="M2 30 Q2 20 14 20 Q26 20 26 30Z" fill="#c084fc" />
                  <circle cx="30" cy="9" r="6" fill="#60a5fa" />
                  <path d="M18 30 Q18 20 30 20 Q42 20 42 30Z" fill="#60a5fa" />
                </svg>
                <span class="ludo-game__pc-label">PLAYERS</span>
              </div>
            </ng-container>

            <!-- Deck: openStatus 0 = blank (? + Sl. No.); 1+ = real tile -->
            <ng-container *ngIf="slot.kind === 'deck'">
              <button
                *ngIf="isDeckHidden(slot.card)"
                type="button"
                class="ludo-game__cell ludo-game__cell--mystery"
                (click)="revealDeckCell(slot.card)"
                [attr.aria-label]="'Hidden tile, Sl. No. ' + trackSerialNo(slot.card) + ', tap to reveal'"
              >
                <span class="ludo-game__mystery-q" aria-hidden="true">?</span>
                <span class="ludo-game__mystery-sl">
                  <span class="ludo-game__mystery-sl-label">Sl. No.</span>
                  <span class="ludo-game__mystery-sl-num">{{ trackSerialNo(slot.card) }}</span>
                </span>
              </button>

              <ng-container *ngIf="!isDeckHidden(slot.card)">
                <div
                  *ngIf="bonusBadgeLabel(slot.card) as bl"
                  class="ludo-game__cell ludo-game__cell--plus"
                >
                  <div class="ludo-game__plus-inner">
                    <div class="ludo-game__plus-badge">{{ bl }}</div>
                  </div>
                </div>
                <div
                  *ngIf="!bonusBadgeLabel(slot.card) && isSkipCard(slot.card)"
                  class="ludo-game__cell ludo-game__cell--cross"
                >
                  <img
                    *ngIf="slot.card.img"
                    [src]="slot.card.img"
                    alt=""
                    class="ludo-game__skip-img"
                  />
                  <div *ngIf="!slot.card.img" class="ludo-game__cross-icon">
                    <svg viewBox="0 0 46 46" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                      <circle cx="23" cy="23" r="21" fill="#2a1a4a" stroke="#6b4fc4" stroke-width="1.5" />
                      <line x1="14" y1="14" x2="32" y2="32" stroke="#c084fc" stroke-width="3" stroke-linecap="round" />
                      <line x1="32" y1="14" x2="14" y2="32" stroke="#c084fc" stroke-width="3" stroke-linecap="round" />
                    </svg>
                  </div>
                </div>
                <button
                  *ngIf="!bonusBadgeLabel(slot.card) && !isSkipCard(slot.card) && isFaceCard(slot.card)"
                  type="button"
                  class="ludo-game__cell"
                  (click)="onDeckCardClick(slot.card)"
                >
                  <span class="ludo-game__cell-num">{{ slot.card.id }}</span>
                </button>
              </ng-container>
            </ng-container>
          </ng-container>
        </div>

        <button type="button" class="ludo-game__gift-card" (click)="onGiftClick()">
          <span class="ludo-game__gift-icon" aria-hidden="true">🎁</span>
          <span class="ludo-game__gift-q">?</span>
          <span class="ludo-game__gift-label">SURPRISE</span>
        </button>
      </div>

      <!-- HIS -->
      <aside class="ludo-game__side ludo-game__side--his" aria-label="His side">
        <div class="ludo-game__side-inner">
          <div class="ludo-game__side-head">
            <div class="ludo-game__avatar ludo-game__avatar--his" aria-hidden="true">♂</div>
            <div class="ludo-game__player-meta">
              <span class="ludo-game__player-name">{{ hisName }}</span>
              <span class="ludo-game__player-role">HIS</span>
            </div>
          </div>
          <div class="ludo-game__side-spacer">
            <div
              class="ludo-game__dice-readout ludo-game__dice-readout--his"
              [class.ludo-game__dice-readout--rolling]="himRolling"
              aria-live="polite"
            >
              {{ himReadout }}
            </div>
          </div>
          <div class="ludo-game__side-actions">
            <button
              type="button"
              class="ludo-game__dice-wrap"
              (click)="rollHim()"
              [disabled]="himRolling"
              aria-label="Roll dice for him"
            >
              <svg
                class="ludo-game__dice-3d"
                [class.ludo-game__dice-3d--roll]="himRolling"
                [class.ludo-game__dice-3d--spin]="diceHimSpin && !himRolling"
                viewBox="0 0 64 64"
                xmlns="http://www.w3.org/2000/svg"
                aria-hidden="true"
              >
                <polygon points="32,4 58,18 32,32 6,18" [attr.fill]="hisDiceColors.top" />
                <polygon points="58,18 58,46 32,60 32,32" [attr.fill]="hisDiceColors.right" />
                <polygon points="6,18 32,32 32,60 6,46" [attr.fill]="hisDiceColors.left" />
                <circle *ngFor="let d of himDots()" [attr.cx]="d[0]" [attr.cy]="d[1]" r="3" [attr.fill]="hisDiceColors.dot" />
              </svg>
            </button>
            <span class="ludo-game__dice-lbl">ROLL</span>
            <button
              type="button"
              class="ludo-game__play-bar ludo-game__play-bar--his"
              (click)="playHim()"
              [disabled]="himRolling"
            >
              <i class="bi bi-play-fill ludo-game__play-bar-icon" aria-hidden="true"></i>
              Play
            </button>
          </div>
        </div>
      </aside>
    </div>
  </div>

  <div *ngIf="portraitHint" class="ludo-game__portrait-overlay" role="alert">
    <div class="ludo-game__portrait-card">
      <div class="ludo-game__portrait-icon-wrap" aria-hidden="true">
        <i class="bi bi-phone ludo-game__portrait-phone"></i>
        <i class="bi bi-arrow-right ludo-game__portrait-arrow"></i>
      </div>
      <p class="ludo-game__portrait-title">Rotate your phone</p>
      <p class="ludo-game__portrait-text">Couples board is played in <strong>landscape</strong>. Turn your device sideways to continue.</p>
    </div>
  </div>

  <div class="ludo-game__toast" [class.ludo-game__toast--show]="toastVisible" role="status" aria-live="polite">
    {{ toastMessage }}
  </div>
</main>
